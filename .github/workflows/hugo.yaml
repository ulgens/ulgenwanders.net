name: Build and deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  build:
    name: Build the site
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    env:
      # TODO: Not sure why baseURL is needed in the build step, check it.
      BASE_URL: "https://ulgenwanders.net/"
      # renovate: datasource=github-releases depName=casey/just
      JUST_VERSION: 1.49.0
      # renovate: datasource=python-version depName=python
      PYTHON_VERSION: 3.14.4
      # renovate: datasource=pypi depName=uv
      UV_VERSION: 0.11.7
      TZ: Europe/Oslo
    timeout-minutes: 1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install just ${{ env.JUST_VERSION }}
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: ${{ env.JUST_VERSION }}

      - name: Install uv ${{ env.UV_VERSION }} & Python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          # TODO: Do we have any environmental concerns about disabling the caching?
          enable-cache: false
          python-version: ${{ env.PYTHON_VERSION }}
          version: ${{ env.UV_VERSION }}

      - name: Install packages
        run: uv sync --frozen --no-install-project

      - name: Configure Git
        run: git config core.quotepath false

        # Hugo cache related steps are removed due to cache poisoning risk.
        # zizmor wasn't raising a warning for the build job,
        # but a poisoning here can still affect the build artifacts.
        # https://docs.zizmor.sh/audits/#cache-poisoning

      - name: Build the site
        env:
          BASE_URL: ${{ steps.pages.outputs.base_url }}/
        run: |
          just build \
            --baseURL "${BASE_URL}"

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'  # Upload artifact only from the main branch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: site-public
          path: ./public

  deploy:
    name: Deploy to Cloudflare Pages
    if: github.ref == 'refs/heads/main'  # Deploy only from the main branch
    runs-on: ubuntu-24.04
    env:
      CF_PROJECT_NAME: ulgenwanders-net
      # renovate: datasource=npm depName=wrangler
      WRANGLER_VERSION: 4.83.0
    timeout-minutes: 1
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: site-public
          path: ./public

        # NPM cache related steps are removed due to cache poisoning risk.
        # https://docs.zizmor.sh/audits/#cache-poisoning

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3.15.0
        with:
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy ./public --project-name ${{ env.CF_PROJECT_NAME }}
