baseURL: "https://ulgenwanders.net/"
locale: "en-us"
title: "Frolicking notes"
theme: "PaperMod"
enableEmoji: true

caches:
  images:
    dir: ":cacheDir/images"

markup:
  highlight:
    lineNos: true

menu:
  main:
    - identifier: "tags"
      name: "Tags"
      pageRef: "/tags"
      weight: 20
    - identifier: "github"
      name: "GitHub"
      pre: "<i class='fa-brands fa-github' aria-hidden='true'></i> "
      url: "https://github.com/ulgens"
      weight: 30
      params:
        open_in_new_tab: true
    - identifier: "linkedin"
      name: "LinkedIn"
      pre: "<i class='fa-brands fa-linkedin' aria-hidden='true'></i> "
      url: "https://www.linkedin.com/in/ulgens/"
      weight: 40
      params:
        open_in_new_tab: true

outputs:
  home:
    - HTML
    - RSS
    # https://github.com/adityatelange/hugo-PaperMod/wiki/Features#search-page
    - JSON

params:
  assets:
    # https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
    disableHLJS: true
  DateFormat: "2 Jan 2006"
  defaultTheme: "dark"
  homeInfoParams:
    Title: "Hi there :wave:"
    Content: "Can be Info, links, about..."
  # TODO: https://github.com/adityatelange/hugo-PaperMod/wiki/Variables#label
  socialIcons:
    - name: "github"
      url: "http://github.com/ulgens/"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/ulgens/"
  # TODO: Commented out options will be visited later.
  # ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowFullTextinRSS: true
  # ShowPostNavLinks: true
  # ShowReadingTime: true
  # ShowRelatedPosts: true
  # ShowRssButtonInSectionTermList: true
  # ShowShareButtons: true
  # FIXME: The template doesn't respect the icon order specified here
  # ShareButtons: ["linkedin", "telegram", "whatsapp", "x"]
  # ShowToc: true
  # ShowWordCount: true
